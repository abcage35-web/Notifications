name: WB RK and Prices Notifications

on:
  workflow_dispatch:
    inputs:
      pachca_chat_id:
        description: "Optional Pachca chat id override for manual/backup runs"
        required: false
        type: string
      report_run_label:
        description: "Optional label shown in both report titles"
        required: false
        default: "08:00 по МСК"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: wb-rk-prices-notifications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      REPORT_TZ: Asia/Tbilisi
      ABCAGE_ANALYZER_MCP_URL: ${{ vars.ABCAGE_ANALYZER_MCP_URL || 'https://mcp.mpvibe.ru/mcp/analyzer' }}
      ABCAGE_ANALYZER_TOKEN: ${{ secrets.ABCAGE_ANALYZER_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      PACHCA_TOKEN: ${{ secrets.PACHCA_TOKEN }}
      REPORT_RUN_LABEL: ${{ inputs.report_run_label || '08:00 по МСК' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r wb-fbo-supply-notifications/requirements.txt -r wb-action-notifications/requirements.txt

      - name: Test stock snapshot and Pachca send guards
        working-directory: wb-action-notifications
        run: python -m unittest -v test_stock_snapshot_guard.py

      - name: Send FBO supply report
        id: fbo_report
        continue-on-error: true
        working-directory: wb-fbo-supply-notifications
        env:
          PACHCA_CHAT_ID: ${{ inputs.pachca_chat_id || secrets.PACHCA_CHAT_ID }}
        run: python send_pachca_report.py

      - name: Send WB action report
        id: action_report
        if: always()
        continue-on-error: true
        working-directory: wb-action-notifications
        env:
          PACHCA_CHAT_ID: ${{ inputs.pachca_chat_id || secrets.PACHCA_CHAT_ID_ACTIONS || secrets.PACHCA_CHAT_ID || '39363429' }}
        run: python send_pachca_report.py

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wb-rk-prices-notifications-report
          path: |
            wb-fbo-supply-notifications/pachca_fbo_supplies_sheet_*.md
            wb-fbo-supply-notifications/pachca_fbo_supplies_sheet_*.json
            wb-action-notifications/pachca_wb_actions_*.md
            wb-action-notifications/pachca_wb_actions_*.json
          if-no-files-found: ignore

      - name: Fail if any report failed
        if: always() && (steps.fbo_report.outcome == 'failure' || steps.action_report.outcome == 'failure')
        run: exit 1
