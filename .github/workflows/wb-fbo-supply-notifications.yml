name: WB FBO Supply Notifications

on:
  schedule:
    # 08:00 Asia/Tbilisi, which is 04:00 UTC.
    - cron: "0 4 * * *"
    # Temporary schedule test: 2026-05-22 14:00 UTC.
    - cron: "0 14 22 5 *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: wb-fbo-supply-notifications
    env:
      REPORT_TZ: Asia/Tbilisi
      ABCAGE_ANALYZER_TOKEN: ${{ secrets.ABCAGE_ANALYZER_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      PACHCA_TOKEN: ${{ secrets.PACHCA_TOKEN }}
      PACHCA_CHAT_ID: ${{ secrets.PACHCA_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build and send Pachca report
        run: python send_pachca_report.py

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wb-fbo-supply-notifications-report
          path: |
            wb-fbo-supply-notifications/pachca_fbo_supplies_sheet_*.md
            wb-fbo-supply-notifications/pachca_fbo_supplies_sheet_*.json
          if-no-files-found: ignore
