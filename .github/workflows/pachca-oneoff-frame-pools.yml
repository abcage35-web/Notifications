name: One-off Frame Pools Pachca Message

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send-message:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PACHCA_TOKEN: ${{ secrets.PACHCA_TOKEN }}
      PACHCA_CHAT_ID: "35216352"
    steps:
      - name: Send Pachca message
        run: |
          node <<'NODE'
          const token = process.env.PACHCA_TOKEN;
          const chatId = process.env.PACHCA_CHAT_ID;
          if (!token) throw new Error("PACHCA_TOKEN is required");
          const content = `@a.manokhin, это по каркасным бассейнам.

| Артикул | FBO | Что отсутствует |
|---|---:|---|
| \`415285942\` | 783 | все есть |
| \`344915498\` | 756 | все есть |
| \`837697737\` | 692 | рекомендации |
| \`837678431\` | 528 | рекомендации |
| \`837692349\` | 386 | рекомендации |
| \`837369933\` | 331 | рекомендации |
| \`998397546\` | 325 | рекомендации |
| \`837684806\` | 306 | все есть |
| \`837668416\` | 299 | рекомендации, рич |
| \`837360796\` | 166 | рекомендации |
| \`840162591\` | 144 | все есть |`;
          const response = await fetch("https://api.pachca.com/api/shared/v1/messages", {
            method: "POST",
            headers: {
              authorization: `Bearer ${token}`,
              "content-type": "application/json",
            },
            body: JSON.stringify({
              message: {
                entity_type: "discussion",
                entity_id: Number(chatId),
                content,
              },
              link_preview: false,
            }),
          });
          const text = await response.text();
          if (!response.ok) throw new Error(`Pachca API failed: ${response.status} ${text}`);
          const payload = text ? JSON.parse(text) : {};
          console.log(JSON.stringify({
            ok: true,
            messageId: payload.data?.id || payload.id,
            chatId,
          }, null, 2));
          NODE
