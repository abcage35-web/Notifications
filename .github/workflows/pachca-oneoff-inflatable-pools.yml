name: One-off Inflatable Pools Pachca Message

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send-message:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PACHCA_TOKEN: ${{ secrets.PACHCA_TOKEN }}
      PACHCA_CHAT_ID: "35216352"
    steps:
      - name: Send Pachca message
        run: |
          node <<'NODE'
          const token = process.env.PACHCA_TOKEN;
          const chatId = process.env.PACHCA_CHAT_ID;
          if (!token) throw new Error("PACHCA_TOKEN is required");
          const content = [
            "@a.beaver, это по надувным бассейнам.",
            "",
            "| Артикул | FBO | Что отсутствует |",
            "|---|---:|---|",
            "| `390628787` | 2 936 | все есть |",
            "| `334584142` | 2 612 | видео |",
            "| `226859452` | 2 493 | все есть |",
            "| `837757051` | 2 449 | все есть |",
            "| `866428482` | 2 110 | рекомендации |",
            "| `388024071` | 2 023 | все есть |",
            "| `837755467` | 1 910 | все есть |",
            "| `964576565` | 1 651 | все есть |",
            "| `837380382` | 1 527 | все есть |",
            "| `964582874` | 1 036 | все есть |",
            "| `866384672` | 1 026 | рекомендации |",
            "| `837398732` | 939 | все есть |",
            "| `837388783` | 777 | все есть |",
            "| `226859451` | 726 | все есть |",
            "| `837410397` | 249 | рекомендации |",
            "| `837402498` | 238 | все есть |",
            "| `226649415` | 208 | все есть |",
          ].join("\n");
          const response = await fetch("https://api.pachca.com/api/shared/v1/messages", {
            method: "POST",
            headers: {
              authorization: `Bearer ${token}`,
              "content-type": "application/json",
            },
            body: JSON.stringify({
              message: {
                entity_type: "discussion",
                entity_id: Number(chatId),
                content,
              },
              link_preview: false,
            }),
          });
          const text = await response.text();
          if (!response.ok) throw new Error(`Pachca API failed: ${response.status} ${text}`);
          const payload = text ? JSON.parse(text) : {};
          console.log(JSON.stringify({
            ok: true,
            messageId: payload.data?.id || payload.id,
            chatId,
          }, null, 2));
          NODE
